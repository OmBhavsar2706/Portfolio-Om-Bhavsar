  <rect x="25" y="25" width="750" height="510" fill="none" stroke="#2B2D42" stroke-width="6" rx="6"/>
  <rect x="35" y="35" width="730" height="490" fill="none" stroke="#D1804B" stroke-width="2" rx="4"/>
  
  <!-- Side accent panels in elegant gold/brown -->
