  <path d="M 765 35 L 600 35 L 765 150 Z" fill="#D1804B" opacity="0.9"/>
  <path d="M 35 525 L 200 525 L 35 410 Z" fill="#D1804B" opacity="0.9"/>
  <path d="M 765 525 L 600 525 L 765 410 Z" fill="#D1804B" opacity="0.9"/>

  <!-- Logo Group -->
  <g transform="translate(100, 75)">
