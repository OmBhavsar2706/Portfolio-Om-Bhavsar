<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="560" fill="#FFFFFF" rx="12"/>
  
  <!-- Right edge Forage Accent Panel -->
  <path d="M 570 0 Q 610 200 570 560 L 800 560 L 800 0 Z" fill="#0052FF" opacity="0.03"/>
  <rect x="580" y="0" width="220" height="150" fill="#0052FF"/>
  <polygon points="580,150 690,150 690,190" fill="#0052FF"/>
  <polygon points="800,150 690,150 690,190" fill="#0052FF"/>

  <g transform="translate(620, 50)">
    <!-- Forage Logo inside White Header -->
    <path d="M 5 0 L 25 -15 L 25 15 Z" fill="#FFFFFF"/>
    <text x="35" y="8" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">Forage</text>
    <text x="-5" y="32" font-family="'Inter', sans-serif" font-size="9" fill="#FFFFFF" opacity="0.8" letter-spacing="0.5px">Inspiring and empowering</text>
    <text x="-5" y="44" font-family="'Inter', sans-serif" font-size="9" fill="#FFFFFF" opacity="0.8" letter-spacing="0.5px">future professionals</text>
  </g>

  <!-- Left Header: EA Logo and Text -->
  <g transform="translate(50, 55)">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#0052FF" stroke-width="2.5"/>
    <text x="20" y="25" font-family="'Inter', sans-serif" font-size="14" font-weight="800" fill="#0052FF" text-anchor="middle">EA</text>
    <text x="48" y="24" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#0052FF" letter-spacing="-0.3px">Electronic Arts</text>
    <line x1="-10" y1="45" x2="450" y2="45" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <!-- Content Group -->
  <g transform="translate(50, 190)">
    <!-- Recipient Name -->
    <text x="0" y="30" font-family="'Inter', sans-serif" font-size="36" font-weight="800" fill="#1E293B">
      Om Bhavsar
    </text>

    <!-- Certificate Title -->
    <text x="0" y="70" font-family="'Inter', sans-serif" font-size="24" font-weight="700" fill="#0F172A">
      Software Engineering Job Simulation
    </text>

    <!-- Subtitle -->
    <text x="0" y="105" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#64748B">
      Certificate of Completion
    </text>
    <text x="0" y="125" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#475569" opacity="0.9">
      December 16th, 2025
    </text>

    <!-- Detail Description -->
    <text x="0" y="185" font-family="'Inter', sans-serif" font-size="9.5" fill="#64748B" font-weight="600">
      Over the period of December 2025, Om Bhavsar has completed practical tasks in:
    </text>
    <text x="0" y="208" font-family="'Inter', sans-serif" font-size="10.5" fill="#334155" font-weight="500">
      • Write a Feature Proposal
    </text>
    <text x="0" y="224" font-family="'Inter', sans-serif" font-size="10.5" fill="#334155" font-weight="500">
      • Create a Game Object Class
    </text>
    <text x="0" y="240" font-family="'Inter', sans-serif" font-size="10.5" fill="#334155" font-weight="500">
      • Improve Inventory System
    </text>
    <text x="0" y="256" font-family="'Inter', sans-serif" font-size="10.5" fill="#334155" font-weight="500">
      • Live Bugfix
    </text>
  </g>

  <!-- Signatures Line -->
  <g transform="translate(640, 430)">
    <!-- Signature Graphic -->
    <path d="M 10 15 Q 25 0 45 25 T 85 10" fill="none" stroke="#2C3E50" stroke-width="1.2"/>
    <line x1="0" y1="28" x2="110" y2="28" stroke="#CBD5E1" stroke-width="1"/>
    <text x="55" y="38" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" fill="#0F172A" text-anchor="middle">Tom Brunskill</text>
    <text x="55" y="48" font-family="'Inter', sans-serif" font-size="8" fill="#64748B" text-anchor="middle">CEO, Co-Founder of</text>
    <text x="55" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Forage</text>
  </g>

  <!-- Verification Codes Footer footer -->
  <g transform="translate(50, 520)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">
      Enrolment Verification Code <tspan fill="#475569" font-weight="600">b2nihk9AaJxZ2bJ26</tspan>  |  User Verification Code 692ff700400c58d8a4aeb198  |  Issued by <tspan font-weight="600">Forage</tspan>
    </text>
  </g>
</svg>
