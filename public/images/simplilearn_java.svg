<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" height="100%">
  <!-- Background & Border -->
  <rect width="800" height="560" fill="#FCFCFD" rx="12"/>
  <rect x="25" y="25" width="750" height="510" fill="none" stroke="#0F2C59" stroke-width="8" rx="8"/>
  <rect x="35" y="35" width="730" height="490" fill="none" stroke="#F8B400" stroke-width="2" rx="6"/>
  
  <!-- Corner Decorative Triangles -->
  <path d="M25 25 L85 25 L25 85 Z" fill="#0F2C59"/>
  <path d="M775 25 L715 25 L775 85 Z" fill="#0F2C59"/>
  <path d="M25 535 L85 535 L25 475 Z" fill="#0F2C59"/>
  <path d="M775 535 L715 535 L775 475 Z" fill="#0F2C59"/>

  <!-- Logo Group -->
  <g transform="translate(100, 75)">
    <text x="0" y="25" font-family="'Inter', sans-serif" font-size="24" font-weight="800" fill="#1C1C1C" letter-spacing="-0.5px">
      simplilearn <tspan fill="#0072B5">SkillUp</tspan>
    </text>
  </g>

  <!-- Certificate Subtitle -->
  <text x="400" y="180" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#667085" letter-spacing="4px" text-anchor="middle">
    CERTIFICATE OF COMPLETION
  </text>

  <!-- Recipient Name -->
  <text x="400" y="250" font-family="'Playfair Display', 'Georgia', serif" font-size="38" font-weight="700" fill="#0F2C59" text-anchor="middle">
    Om Bhavsar
  </text>
  
  <line x1="200" y1="270" x2="600" y2="270" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Course description text -->
  <text x="400" y="305" font-family="'Inter', sans-serif" font-size="14" fill="#475467" text-anchor="middle">
    has successfully completed the online course:
  </text>

  <text x="400" y="335" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#0F2C59" text-anchor="middle">
    Java Programming for Beginners
  </text>

  <text x="400" y="370" font-family="'Inter', sans-serif" font-size="12" fill="#475467" text-anchor="middle" max-width="500">
    This professional has demonstrated initiative and a commitment to deepening their skills and advancing
  </text>
  <text x="400" y="388" font-family="'Inter', sans-serif" font-size="12" fill="#475467" text-anchor="middle" max-width="500">
    their career. Well done!
  </text>

  <!-- Verified Badge -->
  <g transform="translate(400, 415)" text-anchor="middle">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#ECFDF3" stroke="#D1FADF" stroke-width="1"/>
    <text y="4" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#039855" letter-spacing="1px">
      VERIFIED
    </text>
  </g>

  <!-- Footer Info -->
  <text x="100" y="475" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#0F2C59">
    2nd April 2026
  </text>
  <text x="100" y="492" font-family="'Inter', sans-serif" font-size="11" fill="#475467">
    Certificate code : 10043103
  </text>

  <!-- Signature -->
  <g transform="translate(560, 450)">
    <path d="M 10 15 Q 30 5 50 15 T 90 5" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="110" y2="20" stroke="#667085" stroke-width="1"/>
    <text x="55" y="32" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#0F2C59" text-anchor="middle">
      Krishna Kumar
    </text>
    <text x="55" y="43" font-family="'Inter', sans-serif" font-size="9" fill="#667085" text-anchor="middle">
      CEO, Simplilearn
    </text>
  </g>

  <!-- Gold/Yellow Badge Graphic -->
  <g transform="translate(620, 360)">
    <circle cx="0" cy="0" r="42" fill="#F8B400" opacity="0.15"/>
    <circle cx="0" cy="0" r="34" fill="#F8B400"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="2,2"/>
    <!-- Ribbons -->
    <path d="M-12 25 L-25 60 L0 50 L25 60 L12 25 Z" fill="#D49A00" opacity="0.8"/>
    <path d="M-5 25 L-12 65 L0 55 L12 65 L5 25 Z" fill="#F8B400"/>
    <!-- Inner design -->
    <path d="M -10 -15 L 10 -15 L 15 15 L -15 15 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle">
      1:1
    </text>
  </g>
</svg>
