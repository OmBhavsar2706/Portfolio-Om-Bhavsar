    </text>
    <text x="0" y="132" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#475569" opacity="0.9">
      December 5th, 2025
    </text>

    <!-- Detail Description -->
    <text x="0" y="195" font-family="'Inter', sans-serif" font-size="9.5" fill="#6B7280" font-weight="600">
      Over the period of December 2025, Om Bhavsar has completed practical tasks in:
    </text>
    <text x="0" y="222" font-family="'Inter', sans-serif" font-size="11" fill="#374151" font-weight="500">
      • Cyber security Analysis
    </text>
  </g>

  <!-- Signatures Line -->
  <g transform="translate(620, 410)">
    <!-- Signature Graphic -->
    <path d="M 5 22 Q 25 2 45 32 T 95 12" fill="none" stroke="#111827" stroke-width="1.2"/>
    <line x1="0" y1="36" x2="130" y2="36" stroke="#D1D5DB" stroke-width="1"/>
    <text x="65" y="47" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" fill="#111827" text-anchor="middle">Tina McCreery</text>
    <text x="65" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#4B5563" text-anchor="middle">Chief Human</text>
    <text x="65" y="68" font-family="'Inter', sans-serif" font-size="8" fill="#4B5563" text-anchor="middle">Resources Officer,</text>
    <text x="65" y="78" font-family="'Inter', sans-serif" font-size="8" fill="#4B5563" text-anchor="middle">Deloitte</text>
  </g>

  <!-- Verification Codes Footer -->
  <g transform="translate(58, 520)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="9" fill="#9CA3AF">
      Enrolment Verification Code <tspan fill="#374151" font-weight="600">pK8YPoshTDQtitDND</tspan>  |  User Verification Code 692ff700400c58d8a4aeb198  |  Issued by <tspan font-weight="600">Forage</tspan>
    </text>
