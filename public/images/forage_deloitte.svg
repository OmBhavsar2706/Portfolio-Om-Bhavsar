<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="560" fill="#FFFFFF" rx="12"/>

  <!-- Left Header: Deloitte Logo & Branding -->
  <g transform="translate(58, 65)">
    <text x="0" y="24" font-family="'Inter', sans-serif" font-size="32" font-weight="900" fill="#000000" letter-spacing="-1px">
      Deloitte<tspan fill="#86BC25">.</tspan>
    </text>
    <line x1="-12" y1="45" x2="450" y2="45" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <!-- Content Group -->
  <g transform="translate(58, 190)">
    <!-- Recipient Name -->
    <text x="0" y="32" font-family="'Inter', sans-serif" font-size="38" font-weight="800" fill="#111827">
      Om Bhavsar
    </text>

    <!-- Certificate Title -->
    <text x="0" y="75" font-family="'Inter', sans-serif" font-size="28" font-weight="700" fill="#1F2937">
      Cyber Job Simulation
    </text>

    <!-- Subtitle -->
    <text x="0" y="112" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#4B5563">
